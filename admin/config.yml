backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "ensayos"
    label: "Ensayos"
    folder: "ensayos"
    create: true
    slug: "{{slug}}"
    extension: "html"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Categoría", name: "tag", widget: "string" }
      - { label: "Apertura", name: "opening", widget: "text" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "archivo"
    label: "Archivo"
    folder: "contenido/archivo"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Tipo", name: "tipo", widget: "select", options: ["Fragmento", "Nota breve", "Cita", "Observación", "Diario"] }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Contenido", name: "body", widget: "markdown" }