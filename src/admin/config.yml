backend:
  name: github
  repo: jorwash46-design/el-solitario-george
  branch: master
  base_url: https://oauth-github-cms.jorwash46.workers.dev
  auth_endpoint: /auth

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "ensayos"
    label: "Ensayos"
    folder: "src/ensayos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Categoría", name: "tag", widget: "string" }
      - { label: "Apertura", name: "opening", widget: "text" }
      - { label: "Imagen", name: "imagen", widget: "image" }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "archivo"
    label: "Archivo"
    folder: "src/archivo"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Tipo", name: "tipo", widget: "select", options: ["Fragmento", "Nota breve", "Cita", "Observación", "Diario"] }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Contenido", name: "body", widget: "markdown" }